<div id="art-lightbox" class="art-lightbox" hidden>
  <button type="button" class="art-lightbox-close" aria-label="Close">&times;</button>
  <button type="button" class="art-lightbox-prev" aria-label="Previous image">&lsaquo;</button>
  <img class="art-lightbox-img" src="" alt="">
  <button type="button" class="art-lightbox-next" aria-label="Next image">&rsaquo;</button>
</div>
<style>
.art-lightbox{
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.9);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}
.art-lightbox[hidden]{ display: none; }
.art-lightbox-img{
  max-width: 88vw;
  max-height: 88vh;
  object-fit: contain;
}
.art-lightbox-close,
.art-lightbox-prev,
.art-lightbox-next{
  position: absolute;
  background: none;
  border: none;
  color: #fff;
  cursor: pointer;
  line-height: 1;
}
.art-lightbox-close{
  top: 16px;
  right: 24px;
  font-size: 2.2rem;
}
.art-lightbox-prev,
.art-lightbox-next{
  top: 50%;
  transform: translateY(-50%);
  font-size: 3rem;
  padding: 10px 18px;
}
.art-lightbox-prev{ left: 8px; }
.art-lightbox-next{ right: 8px; }
@media (max-width: 600px){
  .art-lightbox-close{ top: 8px; right: 12px; font-size: 2rem; }
  .art-lightbox-prev,
  .art-lightbox-next{ font-size: 2.2rem; padding: 8px 12px; }
}
</style>
<script>
(function(){
  var grid = document.querySelector(".art-grid");
  if (!grid) return;
  var links = Array.prototype.slice.call(grid.querySelectorAll("a"));
  if (!links.length) return;

  var lightbox = document.getElementById("art-lightbox");
  var img = lightbox.querySelector(".art-lightbox-img");
  var idx = 0;

  function show(i){
    idx = (i + links.length) % links.length;
    var link = links[idx];
    var thumb = link.querySelector("img");
    img.src = link.getAttribute("href");
    img.alt = thumb ? thumb.alt : "";
    lightbox.hidden = false;
  }

  function hide(){
    lightbox.hidden = true;
    img.src = "";
  }

  links.forEach(function(link, i){
    link.addEventListener("click", function(e){
      e.preventDefault();
      show(i);
    });
  });

  lightbox.querySelector(".art-lightbox-close").addEventListener("click", hide);
  lightbox.querySelector(".art-lightbox-prev").addEventListener("click", function(){ show(idx - 1); });
  lightbox.querySelector(".art-lightbox-next").addEventListener("click", function(){ show(idx + 1); });
  lightbox.addEventListener("click", function(e){
    if (e.target === lightbox) hide();
  });
  document.addEventListener("keydown", function(e){
    if (lightbox.hidden) return;
    if (e.key === "Escape") hide();
    if (e.key === "ArrowLeft") show(idx - 1);
    if (e.key === "ArrowRight") show(idx + 1);
  });
})();
</script>
